# 1 job: rootless .deb — Dopamine + RootHide (cài rootless được)
name: Build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build rootless deb
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: beerpiss/theos-action@v1
        with:
          cache: true

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq perl curl unzip

      - name: Build package (rootless)
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          set -e
          export PATH="$THEOS/bin:$PATH"
          echo "THEOS=$THEOS"
          ls -la "$THEOS" || true
          make clean || true
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless -j$(nproc)
          echo "=== packages ==="
          ls -la packages/
          mkdir -p dist
          cp -f packages/*.deb dist/
          ls -la dist/

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: KeepAlive-rootless
          path: packages/*.deb
          if-no-files-found: error
