name: Build ForceBanner

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-rootless:
    name: Rootless (Dopamine)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: beerpiss/theos-action@v1
      - name: Build
        run: |
          make clean || true
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mkdir -p dist
          for f in packages/*.deb; do
            [ -f "$f" ] || continue
            cp -f "$f" "dist/forcebanner-rootless-$(basename "$f")"
          done
          ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: forcebanner-rootless
          path: dist/*.deb
          if-no-files-found: error

  build-rootful:
    name: Rootful
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: beerpiss/theos-action@v1
      - name: Build
        run: |
          make clean || true
          sed -i '' 's/iphoneos-arm64/iphoneos-arm/g' control
          make package FINALPACKAGE=1 SCHEME=rootful
          mkdir -p dist
          for f in packages/*.deb; do
            [ -f "$f" ] || continue
            cp -f "$f" "dist/forcebanner-rootful-$(basename "$f")"
          done
          ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: forcebanner-rootful
          path: dist/*.deb
          if-no-files-found: error

  build-roothide:
    name: RootHide
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: beerpiss/theos-action@v1
      - name: Build
        run: |
          make clean || true
          make package FINALPACKAGE=1 SCHEME=roothide THEOS_PACKAGE_SCHEME=roothide || \
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=roothide
          mkdir -p dist
          for f in packages/*.deb; do
            [ -f "$f" ] || continue
            cp -f "$f" "dist/forcebanner-roothide-$(basename "$f")"
          done
          ls -la dist/ || true
      - uses: actions/upload-artifact@v4
        with:
          name: forcebanner-roothide
          path: dist/*.deb
          if-no-files-found: warn

  release:
    needs: [build-rootless, build-rootful]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
