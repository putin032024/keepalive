# 1 bản rootless — Dopamine / RootHide đều dùng được
name: Build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build rootless deb
    # 22.04: toolchain Theos Linux còn hỗ trợ (24.04 = ubuntu-latest sẽ vỡ)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        uses: beerpiss/theos-action@v1
        with:
          cache: true

      - name: Build
        run: |
          set -eux
          export THEOS="${THEOS:-$GITHUB_WORKSPACE/theos}"
          export PATH="$THEOS/bin:$PATH"
          make clean || true
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          ls -lah packages/
          test -n "$(ls packages/*.deb 2>/dev/null)"

      - name: Upload KeepAlive.deb
        uses: actions/upload-artifact@v4
        with:
          name: KeepAlive-rootless
          path: packages/*.deb
          if-no-files-found: error
