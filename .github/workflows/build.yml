name: Build KeepAlive

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos and SDKs
        run: |
          set -e
          git clone --recursive https://github.com/theos/theos.git "$HOME/theos"
          rm -rf "$HOME/theos/sdks"
          git clone --depth=1 https://github.com/theos/sdks.git "$HOME/theos/sdks"
          ls "$HOME/theos/sdks"
          echo "THEOS=$HOME/theos" >> "$GITHUB_ENV"

      - name: Install ldid
        run: brew install ldid || true

      - name: Build package
        run: |
          set -e
          sed -i '' "s/^Version:.*/Version: 1.3.0-${{ github.run_number }}/" control
          make clean || true
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          ls -lah packages/
          # list contents size
          deb=$(ls packages/*.deb | head -1)
          echo "DEB=$deb"
          python3 scripts/list_deb.py "$deb" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: keepalive-rootless-${{ github.run_number }}
          path: packages/*.deb
          if-no-files-found: error
