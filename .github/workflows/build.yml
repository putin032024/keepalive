# Giống HTCam_ios_final: macos + Theos + make package (rootless)
name: Build KeepAlive

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Theos
      run: |
        echo "Installing Theos..."
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Install dependencies
      run: |
        brew install ldid || true

    - name: Build KeepAlive
      run: |
        echo "Building KeepAlive #${{ github.run_number }}"
        sed -i '' "s/^Version:.*/Version: 1.1.0-${{ github.run_number }}/" control
        echo "Patched control: $(grep Version control)"
        make clean || true
        make package FINALPACKAGE=1

    - name: List built packages
      run: |
        echo "=== Built Packages ==="
        find . -name "*.deb" -type f
        ls -lah packages/ || true

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: keepalive-rootless-${{ github.run_number }}
        path: packages/*.deb
        if-no-files-found: error

    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: packages/*.deb
        body: |
          ## KeepAlive rootless

          Immortal keep-alive + forced notification banners.

          1. Gỡ Immortalizer
          2. `dpkg -i *.deb`
          3. Respring
          4. Hold app → Bật KeepAlive
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
